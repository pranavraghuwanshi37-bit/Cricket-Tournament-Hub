kind = "web"
previewPath = "/"
title = "Cricket Tournament Registration"
version = "1.0.0"
id = "artifacts/cricket-tournament"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19084

[services.development]
run = "pnpm --filter @workspace/cricket-tournament run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cricket-tournament", "run", "build" ]
serve = "static"
publicDir = "artifacts/cricket-tournament/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19084"
BASE_PATH = "/"
